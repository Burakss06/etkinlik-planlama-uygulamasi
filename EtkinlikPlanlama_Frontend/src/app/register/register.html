<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 450px;">
    <h2 class="text-center mb-4 fw-bold text-primary">Kayıt Ol</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label for="name" class="form-label fw-semibold">Ad</label>
        <input 
          type="text" 
          class="form-control"
          id="name"
          formControlName="name"
          placeholder="Adınız">
        <div class="invalid-feedback"
             *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
          Ad en az 2 karakter olmalıdır
        </div>
      </div>

      <div class="mb-3">
        <label for="surname" class="form-label fw-semibold">Soyad</label>
        <input 
          type="text" 
          class="form-control"
          id="surname"
          formControlName="surname"
          placeholder="Soyadınız">
        <div class="invalid-feedback"
             *ngIf="registerForm.get('surname')?.invalid && registerForm.get('surname')?.touched">
          Soyad en az 2 karakter olmalıdır
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">E-posta</label>
        <input 
          type="email" 
          class="form-control"
          id="email"
          formControlName="email"
          placeholder="E-posta adresiniz">
        <div class="invalid-feedback"
             *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Geçerli bir e-posta adresi giriniz
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label fw-semibold">Şifre</label>
        <input 
          type="password" 
          class="form-control"
          id="password"
          formControlName="password"
          placeholder="Şifreniz">
        <div class="invalid-feedback"
             *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Şifre en az 6 karakter olmalıdır
        </div>
      </div>

      <button type="submit"
              class="btn btn-primary w-100 mb-3 fw-semibold py-2"
              [disabled]="registerForm.invalid">
        Kayıt Ol
      </button>

    </form>

    <hr>

    <div class="text-center">
      <p class="mb-0 text-muted">
        Zaten hesabınız var mı? 
        <a routerLink="/" class="text-decoration-none fw-semibold">Giriş Yap</a>
      </p>
    </div>
  </div>
</div>

<style>
  .min-vh-100 {
    min-height: 80vh;
  }

  input.ng-invalid.ng-touched {
    border-color: #dc3545;
  }

  input.ng-valid.ng-touched {
    border-color: #198754;
  }

  .invalid-feedback {
    display: block;
  }
</style>
